<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelSmith</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Toolbar ───────────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 40px;
    padding: 0 16px;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }
  .scene-name {
    font-size: 14px;
    font-weight: 600;
    color: #e94560;
  }
  .toolbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .tool-btn {
    background: #2a2a4a;
    border: none;
    color: #8892b0;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tool-btn:hover {
    background: #3a3a5a;
    color: #ccd6f6;
  }
  .tool-btn:disabled {
    color: #444;
    cursor: not-allowed;
  }
  .seed-label {
    color: #6272a4;
    font-size: 11px;
    font-family: monospace;
    margin-left: 8px;
  }

  /* ── Main (viewer + sidebar) ───────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  /* 3D Viewer */
  .viewer {
    flex: 1;
    position: relative;
    background: #111;
    overflow: hidden;
  }
  .viewer canvas { display: block; }

  .empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #555;
    pointer-events: none;
  }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Sidebar (right column) */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: #16213e;
    border-left: 1px solid #2a2a4a;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ── Scene Info (top of sidebar) ───────────────────────── */
  .scene-info {
    padding: 12px 16px;
    border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }
  .scene-info h3 {
    font-size: 11px;
    text-transform: uppercase;
    color: #6272a4;
    margin: 0 0 8px 0;
    letter-spacing: 1px;
  }
  .info-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    gap: 8px;
  }
  .info-label {
    color: #6272a4;
    flex-shrink: 0;
  }
  .info-value {
    color: #ccd6f6;
    font-weight: 500;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Chat Panel (bottom of sidebar) ────────────────────── */
  .chat-panel {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }
  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-msg {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 90%;
    white-space: pre-line;
    word-wrap: break-word;
  }
  .chat-msg.user {
    background: #2a2a4a;
    color: #ccd6f6;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .chat-msg.assistant {
    background: #16213e;
    color: #8892b0;
    align-self: flex-start;
    border: 1px solid #2a2a4a;
    border-bottom-left-radius: 2px;
  }
  .chat-msg.system {
    background: transparent;
    color: #6272a4;
    font-style: italic;
    align-self: center;
    text-align: center;
    font-size: 12px;
  }
  .chat-msg.assistant .pending {
    display: inline-block;
    width: 8px;
    height: 8px;
    border: 2px solid #444;
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  .chat-input-area {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    border-top: 1px solid #2a2a4a;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    background: #0f1626;
    border: 1px solid #2a2a4a;
    color: #ccd6f6;
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
    resize: none;
    font-family: inherit;
  }
  .chat-input:focus {
    outline: none;
    border-color: #e94560;
  }
  .chat-input:disabled {
    background: #0a1020;
    color: #555;
  }
  .chat-send {
    background: #e94560;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    align-self: stretch;
  }
  .chat-send:hover { background: #d63851; }
  .chat-send:disabled { background: #444; cursor: not-allowed; }

  /* ── Export Bar (bottom) ───────────────────────────────── */
  .export-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    height: 48px;
    padding: 0 16px;
    background: #1a1a2e;
    border-top: 1px solid #2a2a4a;
    flex-shrink: 0;
  }
  .export-btn {
    background: #2a2a4a;
    color: #ccd6f6;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 12px;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .export-btn:hover {
    background: #3a3a5a;
  }
  .export-empty {
    color: #444;
    font-size: 12px;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────── -->
<div class="toolbar">
  <span class="scene-name" id="sceneName">LevelSmith</span>
  <div class="toolbar-actions">
    <button id="btnRegenerate" class="tool-btn" title="Regenerate with new seed" disabled>⟳ Regenerate</button>
    <button id="btnReset" class="tool-btn" title="Clear scene and chat">✕ Reset</button>
    <span class="seed-label" id="seedLabel"></span>
  </div>
</div>

<!-- ── Main: viewer + sidebar ──────────────────────── -->
<div class="main">
  <div class="viewer" id="viewer">
    <div class="empty-state" id="emptyState">
      <div style="font-size:48px;opacity:0.3;">&#127984;</div>
      <p>Describe a scene in the chat panel to start</p>
    </div>
    <div class="loading" id="loading" style="display:none;">
      <div class="spinner"></div>
      <div>Generating level...</div>
    </div>
  </div>

  <div class="sidebar" id="sidebar">

    <!-- Scene Info -->
    <div class="scene-info" id="sceneInfo">
      <h3>Scene</h3>
      <div class="info-grid">
        <div class="info-row"><span class="info-label">Style</span><span class="info-value" id="infoStyle">—</span></div>
        <div class="info-row"><span class="info-label">Layout</span><span class="info-value" id="infoLayout">—</span></div>
        <div class="info-row"><span class="info-label">Family</span><span class="info-value" id="infoFamily">—</span></div>
        <div class="info-row"><span class="info-label">Buildings</span><span class="info-value" id="infoCount">—</span></div>
        <div class="info-row"><span class="info-label">Coverage</span><span class="info-value" id="infoCoverage">—</span></div>
        <div class="info-row"><span class="info-label">Roles</span><span class="info-value" id="infoRoles">—</span></div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-history" id="chatHistory">
        <div class="chat-msg system">描述你想要的场景开始生成
生成后可以用自然语言修改：
"主建筑再高一点"
"增加一个塔楼"
"入口改到南边"</div>
      </div>
      <div class="chat-input-area">
        <textarea id="chatInput" class="chat-input" placeholder="describe a scene or ask for an edit..." rows="2"></textarea>
        <button id="chatSend" class="chat-send">Send</button>
      </div>
    </div>

  </div>
</div>

<!-- ── Export Bar ──────────────────────────────────── -->
<div class="export-bar" id="exportBar">
  <a id="dlGlb" class="export-btn" download style="display:none;">Download GLB (Preview)</a>
  <a id="dlJson" class="export-btn" download style="display:none;">Download JSON (UE5)</a>
  <span id="exportEmpty" class="export-empty">no scene yet</span>
</div>

<!-- ── Three.js (importmap) ────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── State ─────────────────────────────────────────
let conversationHistory = [];   // [{role, content}]
let currentScene = null;         // last successful response data
let firstPrompt = null;          // remember the very first user prompt for Regenerate

// ── Three.js setup ────────────────────────────────
let scene, camera, renderer, controls, currentModel;
const viewerEl = document.getElementById('viewer');

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  camera = new THREE.PerspectiveCamera(50, viewerEl.clientWidth / viewerEl.clientHeight, 0.1, 10000);
  camera.position.set(60, 40, 60);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(viewerEl.clientWidth, viewerEl.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  viewerEl.insertBefore(renderer.domElement, viewerEl.firstChild);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(50, 3, 50);

  const amb = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 1.0);
  dir.position.set(80, 120, 60);
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-40, 60, -30);
  scene.add(fill);

  const grid = new THREE.GridHelper(200, 20, 0x333355, 0x222244);
  scene.add(grid);

  animate();

  // ResizeObserver handles flex layout shifts (more reliable than window resize)
  const ro = new ResizeObserver(onResize);
  ro.observe(viewerEl);
  window.addEventListener('resize', onResize);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

function onResize() {
  const w = viewerEl.clientWidth;
  const h = viewerEl.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

function loadGLB(url) {
  const loader = new GLTFLoader();
  loader.load(url, (gltf) => {
    if (currentModel) scene.remove(currentModel);
    currentModel = gltf.scene;

    currentModel.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshStandardMaterial({
          vertexColors: true,
          roughness: 0.7,
          metalness: 0.0,
        });
      }
    });

    scene.add(currentModel);

    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(center.x + maxDim * 0.8, center.y + maxDim * 0.5, center.z + maxDim * 0.8);
    controls.target.copy(center);
    controls.update();

    document.getElementById('emptyState').style.display = 'none';
  });
}

// ── Chat helpers ──────────────────────────────────
function appendMessage(role, content) {
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  if (typeof content === 'string') {
    div.textContent = content;
  } else {
    div.appendChild(content);
  }
  const history = document.getElementById('chatHistory');
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
  return div;
}

function appendPendingMessage(text) {
  const span = document.createElement('span');
  span.innerHTML = `<span class="pending"></span>${text}`;
  return appendMessage('assistant', span);
}

function setInputEnabled(enabled) {
  document.getElementById('chatInput').disabled = !enabled;
  document.getElementById('chatSend').disabled = !enabled;
}

// ── Scene info / toolbar updates ──────────────────
function updateSceneInfo(data) {
  const zone0 = (data.parsed && data.parsed.zones && data.parsed.zones[0]) || {};
  const s = data.stats || {};
  const c = data.classification || {};

  document.getElementById('infoStyle').textContent = zone0.style || '—';
  document.getElementById('infoLayout').textContent = zone0.layout || '—';
  document.getElementById('infoFamily').textContent =
    c.family ? `${c.family} (${(c.confidence * 100).toFixed(0)}%)` : '—';

  // Use != null (not ||) so building_count=0 still displays.
  // Fall back to building_infos.length if api.py doesn't include the field.
  const count = (s.building_count != null)
    ? s.building_count
    : (data.building_infos || []).length;
  document.getElementById('infoCount').textContent =
    (count > 0 || s.building_count === 0) ? count : '—';

  document.getElementById('infoCoverage').textContent =
    (s.coverage != null) ? `${(s.coverage * 100).toFixed(1)}%` : '—';

  // Roles: 1P 2S 3T 2A
  const roles = (data.building_infos || []).reduce((acc, b) => {
    const r = b.role || 'unknown';
    acc[r] = (acc[r] || 0) + 1;
    return acc;
  }, {});
  const order = ['primary', 'secondary', 'tertiary', 'ambient'];
  const parts = order
    .filter(r => roles[r])
    .map(r => `${roles[r]}${r[0].toUpperCase()}`);
  document.getElementById('infoRoles').textContent = parts.length ? parts.join(' ') : '—';
}

function updateToolbar(data) {
  const zone0 = (data.parsed && data.parsed.zones && data.parsed.zones[0]) || {};
  const name = zone0.style || 'Scene';
  document.getElementById('sceneName').textContent = name.replace(/_/g, ' ');
  const seed = data.parsed && data.parsed.seed;
  document.getElementById('seedLabel').textContent = (seed != null) ? `seed: ${seed}` : '';
  document.getElementById('btnRegenerate').disabled = false;
}

function updateDownloadLinks(data) {
  const dlGlb = document.getElementById('dlGlb');
  const dlJson = document.getElementById('dlJson');
  dlGlb.href = data.glb_url;
  dlJson.href = data.json_url;
  dlGlb.style.display = '';
  dlJson.style.display = '';
  document.getElementById('exportEmpty').style.display = 'none';
}

function resetSceneInfo() {
  ['infoStyle','infoLayout','infoFamily','infoCount','infoCoverage','infoRoles']
    .forEach(id => document.getElementById(id).textContent = '—');
  document.getElementById('sceneName').textContent = 'LevelSmith';
  document.getElementById('seedLabel').textContent = '';
  document.getElementById('btnRegenerate').disabled = true;
  document.getElementById('dlGlb').style.display = 'none';
  document.getElementById('dlJson').style.display = 'none';
  document.getElementById('exportEmpty').style.display = '';
  if (currentModel) {
    scene.remove(currentModel);
    currentModel = null;
  }
  document.getElementById('emptyState').style.display = '';
}

// ── Generation / editing flow ─────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  appendMessage('user', msg);
  input.value = '';
  setInputEnabled(false);

  conversationHistory.push({ role: 'user', content: msg });
  if (firstPrompt == null) firstPrompt = msg;

  let pendingMsg;

  try {
    if (!currentScene) {
      // ── First turn → /generate ──
      pendingMsg = appendPendingMessage('正在生成场景...');
      document.getElementById('loading').style.display = 'block';

      const resp = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: msg }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      // Debug: dump the full response so the actual field paths are visible
      // in the browser console (helpful when api.py changes shape).
      console.log('API /generate response:', JSON.stringify(data, null, 2));
      currentScene = data;

      loadGLB(data.glb_url);
      updateSceneInfo(data);
      updateToolbar(data);
      updateDownloadLinks(data);

      pendingMsg.remove();
      // Defensive field access — falls back gracefully if api.py is on an
      // older revision and doesn't yet return building_count / coverage.
      const stats = data.stats || {};
      const count = (stats.building_count != null)
        ? stats.building_count
        : (data.building_infos || []).length;
      const cov = (stats.coverage != null)
        ? `${(stats.coverage * 100).toFixed(1)}%`
        : '?';
      const summary =
        `✓ 场景已生成\n` +
        `${count} 栋建筑 · ${cov} 覆盖率\n` +
        `可以继续描述修改`;
      appendMessage('assistant', summary);
      conversationHistory.push({ role: 'assistant', content: summary });

    } else {
      // ── Subsequent turns → /edit (not implemented yet) ──
      pendingMsg = appendPendingMessage('正在修改...');

      const resp = await fetch('/edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          instruction: msg,
          conversation_history: conversationHistory,
          current_scene: { glb_url: currentScene.glb_url, json_url: currentScene.json_url },
        }),
      });

      pendingMsg.remove();

      if (resp.ok) {
        const data = await resp.json();
        currentScene = data;
        loadGLB(data.glb_url);
        updateSceneInfo(data);
        updateToolbar(data);
        updateDownloadLinks(data);
        const text = `✓ updated\n${data.edit_summary || ''}`;
        appendMessage('assistant', text);
        conversationHistory.push({ role: 'assistant', content: text });
      } else {
        const text = '修改功能即将上线 (edit endpoint not implemented yet)';
        appendMessage('assistant', text);
        conversationHistory.push({ role: 'assistant', content: text });
      }
    }
  } catch (err) {
    if (pendingMsg) pendingMsg.remove();
    appendMessage('assistant', `error: ${err.message}`);
  } finally {
    document.getElementById('loading').style.display = 'none';
    setInputEnabled(true);
    document.getElementById('chatInput').focus();
  }
}

// ── Reset / Regenerate ────────────────────────────
function resetAll() {
  currentScene = null;
  conversationHistory = [];
  firstPrompt = null;
  document.getElementById('chatHistory').innerHTML = `
    <div class="chat-msg system">描述你想要的场景开始生成
生成后可以用自然语言修改：
"主建筑再高一点"
"增加一个塔楼"
"入口改到南边"</div>
  `;
  resetSceneInfo();
}

function regenerate() {
  if (!firstPrompt) return;
  // Drop currentScene so the next sendMessage takes the /generate branch.
  currentScene = null;
  document.getElementById('chatInput').value = firstPrompt;
  sendMessage();
}

// ── Init + bindings ───────────────────────────────
initThree();

document.getElementById('chatSend').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  // Enter sends, Shift+Enter inserts newline
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById('btnRegenerate').addEventListener('click', regenerate);
document.getElementById('btnReset').addEventListener('click', resetAll);

document.getElementById('chatInput').focus();
</script>
</body>
</html>
