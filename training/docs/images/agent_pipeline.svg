<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #444; }
  .ts { font-size: 12px; font-weight: 400; fill: #666; }
  .arr { stroke: #888; stroke-width: 1.5; }
  .leader { stroke: #888; stroke-width: 0.5; stroke-dasharray: 4 3; }
  .fill-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .fill-teal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .fill-coral { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .fill-blue { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .fill-gray { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .t-purple { fill: #3C3489; } .t-teal { fill: #085041; } .t-coral { fill: #712B13; }
  .t-blue { fill: #0C447C; } .t-gray { fill: #444441; }
  .ts-purple { fill: #534AB7; } .ts-teal { fill: #0F6E56; } .ts-coral { fill: #993C1D; }
  .ts-blue { fill: #185FA5; } .ts-gray { fill: #5F5E5A; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="th t-gray" x="340" y="30" text-anchor="middle">LevelSmith agent pipeline</text>

<!-- User Input -->
<rect class="fill-gray" x="220" y="50" width="240" height="44" rx="8"/>
<text class="th t-gray" x="340" y="76" text-anchor="middle">User prompt</text>
<line x1="340" y1="94" x2="340" y2="120" class="arr" marker-end="url(#arrow)"/>

<!-- Agent 1: Archetype -->
<rect class="fill-purple" x="140" y="120" width="400" height="90" rx="12"/>
<text class="th t-purple" x="340" y="148" text-anchor="middle">Agent 1: archetype planning</text>
<text class="ts ts-purple" x="340" y="168" text-anchor="middle">DeepSeek API → JSON plan</text>
<text class="ts ts-purple" x="340" y="186" text-anchor="middle">buildings, roles, spatial_rules, enclosure</text>

<!-- Fallback -->
<rect class="fill-gray" x="555" y="130" width="100" height="44" rx="8"/>
<text class="ts ts-gray" x="605" y="156" text-anchor="middle">regex fallback</text>
<line x1="540" y1="155" x2="555" y2="155" class="leader" marker-end="url(#arrow)"/>

<line x1="340" y1="210" x2="340" y2="240" class="arr" marker-end="url(#arrow)"/>
<text class="ts ts-gray" x="355" y="228" text-anchor="start">plan_to_params()</text>

<!-- Phase 0.5: Road Skeleton -->
<rect class="fill-teal" x="140" y="240" width="400" height="56" rx="8"/>
<text class="th t-teal" x="340" y="262" text-anchor="middle">Phase 0.5: road skeleton</text>
<text class="ts ts-teal" x="340" y="280" text-anchor="middle">Single source of truth for all road positions</text>
<line x1="340" y1="296" x2="340" y2="326" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 1: Lot System -->
<rect class="fill-teal" x="140" y="326" width="400" height="72" rx="8"/>
<text class="th t-teal" x="340" y="350" text-anchor="middle">Phase 1: lot-based placement</text>
<text class="ts ts-teal" x="340" y="368" text-anchor="middle">Shapely: scene - roads = buildable lots</text>
<text class="ts ts-teal" x="340" y="384" text-anchor="middle">1 lot = 1 building (strict)</text>

<!-- Style Profile inject to Phase 1 -->
<rect class="fill-coral" x="555" y="290" width="110" height="56" rx="8"/>
<text class="th t-coral" x="610" y="312" text-anchor="middle">Style profile</text>
<text class="ts ts-coral" x="610" y="330" text-anchor="middle">group_rules</text>
<line x1="555" y1="318" x2="540" y2="350" class="leader" marker-end="url(#arrow)"/>

<line x1="340" y1="398" x2="340" y2="428" class="arr" marker-end="url(#arrow)"/>

<!-- Phase 5: Mesh Generation -->
<rect class="fill-blue" x="100" y="428" width="480" height="90" rx="12"/>
<text class="th t-blue" x="340" y="456" text-anchor="middle">Phase 5: per-building mesh generation</text>
<text class="ts ts-blue" x="340" y="476" text-anchor="middle">style_key → get_style_params() → apply_style_profile(role=)</text>
<text class="ts ts-blue" x="340" y="494" text-anchor="middle">mid-scale: eave beams, buttress, base, parapet</text>

<!-- Style Profile inject to Phase 5 -->
<rect class="fill-coral" x="555" y="378" width="110" height="72" rx="8"/>
<text class="th t-coral" x="610" y="400" text-anchor="middle">Style profile</text>
<text class="ts ts-coral" x="610" y="418" text-anchor="middle">6 layers +</text>
<text class="ts ts-coral" x="610" y="434" text-anchor="middle">role decay</text>
<line x1="555" y1="414" x2="580" y2="460" class="leader" marker-end="url(#arrow)"/>

<!-- Phase 3 + 6 -->
<line x1="240" y1="518" x2="240" y2="548" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="518" x2="440" y2="548" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-teal" x="100" y="548" width="230" height="56" rx="8"/>
<text class="th t-teal" x="215" y="570" text-anchor="middle">Phase 3: road mesh</text>
<text class="ts ts-teal" x="215" y="588" text-anchor="middle">From skeleton → RoadGraph</text>

<rect class="fill-purple" x="350" y="548" width="230" height="56" rx="8"/>
<text class="th t-purple" x="465" y="570" text-anchor="middle">Phase 6: walls + gates</text>
<text class="ts ts-purple" x="465" y="588" text-anchor="middle">Shapely intersection</text>

<line x1="340" y1="604" x2="340" y2="634" class="arr" marker-end="url(#arrow)"/>

<!-- Export -->
<rect class="fill-gray" x="200" y="634" width="280" height="44" rx="8"/>
<text class="th t-gray" x="340" y="660" text-anchor="middle">GLB + FBX export</text>
<line x1="340" y1="678" x2="340" y2="700" class="arr" marker-end="url(#arrow)"/>

<rect class="fill-gray" x="160" y="700" width="360" height="44" rx="8"/>
<text class="th t-gray" x="340" y="726" text-anchor="middle">FastAPI → Three.js preview / UE5 import</text>

<!-- Legend -->
<rect x="40" y="780" width="600" height="120" rx="12" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="th t-gray" x="60" y="805">Legend</text>
<rect x="60" y="818" width="12" height="12" rx="2" fill="#534AB7" opacity="0.6"/>
<text class="ts ts-gray" x="80" y="829">LLM agent (DeepSeek)</text>
<rect x="60" y="838" width="12" height="12" rx="2" fill="#0F6E56" opacity="0.6"/>
<text class="ts ts-gray" x="80" y="849">Geometry engine (Python)</text>
<rect x="60" y="858" width="12" height="12" rx="2" fill="#D85A30" opacity="0.6"/>
<text class="ts ts-gray" x="80" y="869">Style data (profiles)</text>
<rect x="300" y="818" width="12" height="12" rx="2" fill="#888780" opacity="0.6"/>
<text class="ts ts-gray" x="320" y="829">I/O + export</text>
<text class="ts ts-gray" x="300" y="849">Solid arrow = data flow</text>
<text class="ts ts-gray" x="300" y="869">Dashed arrow = parameter injection</text>
</svg>
